name: Documentation Check

on:
  push:
    branches: [main, develop]
    paths:
      - "**.md"
      - "scripts/validate-docs.ts"
  pull_request:
    branches: [main, develop]
    paths:
      - "**.md"
      - "scripts/validate-docs.ts"

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build scripts
        run: npm run build

      - name: Run documentation validation
        run: npx tsx scripts/validate-docs.ts
        id: validate
        continue-on-error: true

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --max-retries 3 --exclude-mail "**/*.md"
          fail: false
        id: lychee

      - name: Report status
        if: always()
        run: |
          echo "## Documentation Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outcome }}" == "success" ]; then
            echo "✅ Documentation validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Documentation validation failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.lychee.outcome }}" == "success" ]; then
            echo "✅ Link check passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Link check completed with issues" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-validation-report
          path: |
            docs-report.json
            lychee/out.md
          retention-days: 7
