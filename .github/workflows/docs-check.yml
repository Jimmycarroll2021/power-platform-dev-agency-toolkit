name: Documentation Check

on:
  push:
    branches: [main, develop]
    paths:
      - "**.md"
      - "scripts/validate-docs.ts"
      - "packages/cli/test/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "**.md"
      - "scripts/validate-docs.ts"
      - "packages/cli/test/**"

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build scripts
        run: npm run build

      - name: Run full validation (structure + docs)
        run: npm run validate
        id: validate
        continue-on-error: false

      - name: Run tests
        run: npm run test
        continue-on-error: false

      - name: Report status
        if: always()
        run: |
          echo "## Documentation Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outcome }}" == "success" ]; then
            echo "[PASS] Documentation validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "[FAIL] Documentation validation failed" >> $GITHUB_STEP_SUMMARY
          fi
